name: Daily News Summary

on:
  schedule:
     - cron: '20 20 * * *'  # 05:20 KST (20:20 UTC) — 노션 루틴(06:30)보다 앞당김
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Fetch market indicators
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_indicators.py

      - name: Generate news summary
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python scripts/generate_news.py

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add daily_news/
          git diff --staged --quiet || git commit -m "feat: $(date +'%y%m%d') 뉴스 요약 + 시장 지표 자동 업로드"
          git push
